<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Turbo Heli</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="wrap">
  <div id="screen">
    <canvas id="cv" width="480" height="640"></canvas>
    <canvas id="gl"></canvas>
  </div>
  <div id="hud">
    <span class="panel"><span class="lbl">Pontos</span><b id="score">0</b></span>
    <span class="panel"><span class="lbl">Recorde</span><b id="hi">0</b></span>
    <span class="panel"><span class="lbl">Vidas</span><b id="lives">3</b></span>
  </div>
  <div id="msg">
    <h1>TURBO HELI</h1>
    <div class="sub">AERIAL ASSAULT</div>
    <p><span class="key">← ↑ → ↓</span> mover &nbsp; <span class="key">ESPAÇO</span> tiro &nbsp;
       <span class="key">B</span> bomba</p>
    <p id="modeSel"></p>
    <p class="blink">▶ Pressione ENTER para começar</p>
  </div>
  <div id="touch">
    <div class="pad" id="tPad"><div class="stick" id="tStick"></div></div>
    <div class="btn" id="bFire">FOGO</div>
    <div class="btn" id="bBomb">BOMBA</div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
