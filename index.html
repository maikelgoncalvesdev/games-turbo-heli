  }
  // cidade: prédios vêm da malha viária coerente (drawCityGrid), não aqui
}

// textura de oceano: marulho ondulado + reflexo especular + espuma
function drawOceanSwell() {
  ctx.save();
  const sc = scrollY;                                  // rola com o mundo

  // 1) grandes manchas de reflexo (sheen) que sobem devagar
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 7; i++) {
    const px = (W * (0.13 + 0.74 * ((i * 0.37) % 1)))
             + Math.sin(sc * 0.004 + i) * 40;
    let py = ((i * 151.3 - sc * 0.5) % (H + 220) + (H + 220)) % (H + 220) - 110;
    const rx = 90 + (i % 3) * 26, ry = 34 + (i % 2) * 12;
    const g = ctx.createRadialGradient(px, py, 0, px, py, rx);
    g.addColorStop(0, 'rgba(150,205,235,0.10)');
    g.addColorStop(1, 'rgba(150,205,235,0)');
    ctx.fillStyle = g;
    ctx.save(); ctx.translate(px, py); ctx.scale(1, ry / rx);
    ctx.beginPath(); ctx.arc(0, 0, rx, 0, 7); ctx.fill();
    ctx.restore();
  }
  ctx.globalCompositeOperation = 'source-over';

  // 2) marulho: cristas onduladas (2 frequências cruzadas, não paralelas)
  for (let y = -24; y < H + 24; y += 18) {
    const wy = y + sc * 0.6;                            // fase ligada ao mundo
    const a1 = 4 + Math.sin(wy * 0.03) * 2.2;
    ctx.lineWidth = 2.2;
    ctx.strokeStyle = 'rgba(205,236,252,0.13)';
    ctx.beginPath();
    for (let x = -20; x <= W + 20; x += 16) {
      const yy = y
        + Math.sin(wy * 0.05 + x * 0.045) * a1
        + Math.sin(x * 0.017 - sc * 0.012) * 5;
      x === -20 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
    }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(8,32,58,0.20)';             // sombra do vale
    ctx.beginPath();
    for (let x = -20; x <= W + 20; x += 16) {
      const yy = y + 5
        + Math.sin(wy * 0.05 + x * 0.045) * a1
        + Math.sin(x * 0.017 - sc * 0.012) * 5;
      x === -20 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
    }
    ctx.stroke();
  }

  // 3) flocos de espuma cintilando
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 40; i++) {
    const fx = (i * 89.7) % W;
    let fy = ((i * 47.13 - sc * 0.8) % (H + 30) + (H + 30)) % (H + 30) - 15;
    const tw = 0.35 + 0.65 * Math.abs(Math.sin(i * 1.7 + frame * 0.06));
    ctx.fillStyle = `rgba(225,245,255,${0.18 * tw})`;
    ctx.beginPath();
    ctx.ellipse(fx, fy, 2.4, 1.3, 0, 0, 7);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}

// malha urbana coerente: quarteirões + ruas/avenidas contínuas no mundo
function drawCityGrid() {
  const BLK = 132, RW = 30;
  // faixas verticais (em tela) onde o bioma é cidade
  // faixas exatas (limites = emendas dos segmentos) -> sem piscar na troca
  const bands = [];
  for (let s = segOf(H + 40); s <= segOf(-40); s++) {
    if (biomeOf(s) !== 'city') continue;
    const ya = Math.max(-40, scrollY - (s + 1) * SEG);
    const yb = Math.min(H + 40, scrollY - s * SEG);
    if (yb > ya) bands.push([ya, yb]);
  }
  if (!bands.length) return;

  const tones = ['#54585f', '#494d54', '#5e636b', '#43474d'];
  ctx.save();
  for (const [ya, yb] of bands) {
    ctx.save();
    ctx.beginPath(); ctx.rect(0, ya, W, yb - ya); ctx.clip();

    const kx1 = Math.ceil(W / BLK);
    const kz0 = Math.floor((ya - scrollY) / BLK) - 1;
    const kz1 = Math.ceil((yb - scrollY) / BLK) + 1;

    // quarteirões (blocos) alinhados à grade do mundo
    for (let kx = 0; kx <= kx1; kx++) {
      for (let kz = kz0; kz <= kz1; kz++) {
        const bxs = kx * BLK + RW / 2;
        const bys = kz * BLK + scrollY + RW / 2;
        const bw = BLK - RW, bh = BLK - RW;
        const t = vnoise(kx * 1.7 + 3, kz * 1.7 + 9);
        ctx.fillStyle = tones[(t * 4 | 0) % 4];
        ctx.fillRect(bxs, bys, bw, bh);
        ctx.fillStyle = 'rgba(255,255,255,.06)';
        ctx.fillRect(bxs, bys, bw, 4);
        ctx.fillStyle = 'rgba(0,0,0,.30)';
        ctx.fillRect(bxs, bys + bh - 5, bw, 5);
        // janelas
        ctx.fillStyle = 'rgba(207,230,245,.20)';
        for (let wxi = 10; wxi < bw - 6; wxi += 16)
          for (let wyi = 12; wyi < bh - 6; wyi += 18)
            ctx.fillRect(bxs + wxi, bys + wyi, 7, 9);
      }
    }
    // faixas amarelas tracejadas — avenidas (vert.) e ruas (horiz.)
    ctx.fillStyle = '#f2f2f2';                    // faixas BRANCAS
    // tracejado ANCORADO ao mundo (anda junto com os quarteirões)
    const startY = Math.ceil((ya - scrollY) / 30) * 30 + scrollY;
    for (let kx = 0; kx <= kx1 + 1; kx++) {
      const ax = kx * BLK;                       // x do mundo == x da tela
      for (let yy = startY; yy < yb; yy += 30)
        ctx.fillRect(ax - 2, yy, 4, 14);
    }
    for (let kz = kz0; kz <= kz1 + 1; kz++) {
      const ry = kz * BLK + scrollY;
      if (ry < ya - 2 || ry > yb + 2) continue;
      for (let xx = 12; xx < W; xx += 30) ctx.fillRect(xx, ry - 2, 13, 4);
    }
    ctx.restore();
  }
  ctx.restore();
}

function drawTerrain() {
  ctx.fillStyle = '#1c5733';
  ctx.fillRect(0, 0, W, H);

  // ---- solo por bioma (célula = linha de mundo fixa Wc) ----
  const C = 64;
  for (let Wc = Math.floor((-C - scrollY)/C);
           Wc <= Math.ceil((H + C - scrollY)/C); Wc++) {
    const sy = Wc*C + scrollY;
    for (let bx = 0; bx < W/C + 1; bx++) {
      const sx = bx*C;
      const wx = sx, wy = Wc*C;                 // coords de MUNDO (contínuas)
      const b = biomeBlend(sy + C/2, vnoise(wx/90+9, wy/90+4));
      const pal = BIOME_PAL[b];
      // ruído contínuo: manchas grandes que atravessam células
      const n  = vnoise(wx/150, wy/150);
      const n2 = vnoise(wx/60 + 21, wy/60 + 8);
      if (b === 'ocean') {
        const yy = sy + C/2;
        const d = 0.5 + 0.5*Math.sin(yy*0.010) + 0.18*Math.sin(sx*0.018+yy*0.02);
        const r = 22 + d*14, g = 70 + d*36, bl = 110 + d*42;
        ctx.fillStyle = `rgb(${r|0},${g|0},${bl|0})`;
      } else {
        ctx.fillStyle = n < .42 ? pal.g[0] : (n < .74 ? pal.g[1] : pal.g[2]);
      }
      ctx.fillRect(sx, sy, C, C);
      if (b === 'forest') {
        // clareiras/folhagem: manchas suaves coerentes (ruído)
        if (n2 > .68) { ctx.fillStyle = pal.acc;
          ctx.beginPath();
          ctx.ellipse(sx+C/2, sy+C/2, C*0.5*(0.55+n2*0.5), C*0.34, 0,0,7);
          ctx.fill(); }
      } else if (b === 'desert') {
        // dunas: cristas LONGAS e contínuas (fase no mundo, casam entre células)
        const f = X => sy + 20 + Math.sin(X*0.016 + wy*0.022)*11;
        ctx.lineWidth = 5;
        ctx.strokeStyle = n2 > .5 ? 'rgba(255,235,180,.22)'
                                  : 'rgba(150,110,55,.20)';
        ctx.beginPath();
        ctx.moveTo(sx, f(sx));
        ctx.quadraticCurveTo(sx+C/2, f(sx+C/2), sx+C, f(sx+C));
        ctx.stroke();
      } else if (b === 'ice') {
        // placas de gelo (ruído) + rachadura contínua que atravessa células
        if (n2 > .55) { ctx.fillStyle='rgba(255,255,255,.40)';
          ctx.beginPath();
          ctx.ellipse(sx+C/2, sy+C/2, C*0.46, C*0.30, 0,0,7); ctx.fill(); }
        const cc = wy*0.03;
        ctx.strokeStyle='rgba(120,150,175,.42)'; ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(sx,   sy + (0.5+0.45*Math.sin(sx*0.05+cc))*C);
        ctx.lineTo(sx+C, sy + (0.5+0.45*Math.sin((sx+C)*0.05+cc))*C);
        ctx.stroke();
      }
      // cidade: ruas/quarteirões num passe global coerente (drawCityGrid)
    }
  }
  drawCityGrid();                               // malha viária contínua

  // ---- textura de mar (passe global sobre as células de oceano) ----
  if (biomeOf(segOf(-40)) === 'ocean' || biomeOf(segOf(H+40)) === 'ocean')
    drawOceanSwell();

  // ---- lagos (biomas de cidade) ----
  cityLakes().forEach(l => {
    ctx.fillStyle = '#6a6f74';                    // margem de concreto
    ctx.beginPath(); ctx.ellipse(l.x,l.y,l.rx+8,l.ry+8,0,0,7); ctx.fill();
    const lp = () => { ctx.beginPath();
      ctx.ellipse(l.x,l.y,l.rx,l.ry,0,0,7); ctx.closePath(); };
    const lhw = y => { const d=1-((y-l.y)/l.ry)**2;
      return d>0 ? l.rx*Math.sqrt(d) : 0; };
    drawWaterBody(lp, () => l.x, lhw);
    ctx.strokeStyle='rgba(220,240,255,.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(l.x,l.y,l.rx,l.ry,0,0,7); ctx.stroke();
  });

  // ---- rio (quando o segmento tem rio) ----
  let hasRiver = false;
  for (let y=0;y<=H;y+=40) if (riverHWAt(y) > 0) { hasRiver = true; break; }
  if (hasRiver) {
    ctx.fillStyle = '#c9b274';                    // bancos de areia
    riverPath(9); ctx.fill();
    drawWaterBody(() => riverPath(0), riverCX, riverHWAt);
    // contorno ESTÁVEL (sem animação) seguindo o mesmo traçado do rio
    ctx.lineWidth = 3; ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(220,240,255,.32)';
    riverPath(0); ctx.stroke();
  }

  // ---- trilhos de trem ----
  const rails = [];
  lineList(RAIL_P, -40, H+40).forEach(o => {
    const railY = railScreenY(o.n);
    if (railY < -40 || railY > H) return;
    if (biomeOf(segOf(railY)) === 'ocean') return;   // sem trilho no mar
    rails.push(railY);
    ctx.fillStyle = '#5b5750'; ctx.fillRect(0, railY-3, W, 28);
    ctx.fillStyle = '#4a3625';
    for (let x = 0; x < W; x += 16) ctx.fillRect(x, railY-1, 10, 24);
    ctx.fillStyle = '#9aa1aa';
    ctx.fillRect(0, railY+3, W, 4); ctx.fillRect(0, railY+15, W, 4);
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.fillRect(0, railY+3, W, 1); ctx.fillRect(0, railY+15, W, 1);
  });

  // ---- estradas ----
  const roads = [];
  lineList(ROAD_P, -40, H+40).forEach(o => {
    const roadY = o.y;
    if (roadY < -40 || roadY > H) return;
    if (biomeOf(segOf(roadY)) === 'ocean') return;   // sem estrada no mar
    roads.push(roadY);
    ctx.fillStyle = '#4d4641'; ctx.fillRect(0, roadY, W, 30);
    ctx.fillStyle = '#3b3531';
    ctx.fillRect(0, roadY, W, 4); ctx.fillRect(0, roadY+26, W, 4);
    ctx.fillStyle = '#f2f2f2';                       // faixa BRANCA
    for (let x = 0; x < W; x += 44) ctx.fillRect(x+10, roadY+13, 22, 4);
  });
  gRails = rails; gRoads = roads;

  // ---- decorações por bioma ----
  const TC = 80;
  for (let Wc = Math.floor((-TC - scrollY)/TC);
           Wc <= Math.ceil((H + TC - scrollY)/TC); Wc++) {
    const rowY = Wc*TC + scrollY;
    for (let bx = 0; bx < W/TC + 1; bx++) {
      const h = hash(bx*2+1, Wc*2+1);
      const px = bx*TC + (hash(bx, Wc)*0.6 + 0.2)*TC;
      const py = rowY + (h*0.5)*TC;
      if (helipad && Math.abs(px - helipad.x) < 70 &&
          Math.abs(py - (helipad.sy0 + scrollY)) < 70) continue;  // sem mato no heliporto
      const b = biomeBlend(py, hash(bx*7+3, Wc*7+3));
      const thr = b === 'city' ? 0.35 : 0.5;      // cidade = mais densa
      if (h < thr) continue;
      if (inRiver(px, py, 20) || inLake(px, py, 18)) continue;
      if (roads.some(r => Math.abs(py - r) < 32)) continue;
      if (rails.some(r => Math.abs(py - r) < 26)) continue;
      const cnt = b === 'city' ? 1 : 1 + (h*3|0);
      for (let k = 0; k < cnt; k++)
        drawScatter(b,
          px + (hash(bx+k, Wc)-.5)*46,
          py + (hash(Wc+k, bx)-.5)*40,
          10 + hash(k+1, bx+Wc)*7,
          hash(bx+k*3, Wc+k));
    }
  }

  drawHelipad();                       // heliporto da decolagem (sobre o solo)
}

function drawHelipad() {
  if (!helipad) return;
  const cx = helipad.x, cy = helipad.sy0 + scrollY;
  if (cy > H + 90) { helipad = null; return; }     // já saiu da tela
  ctx.save();
  ctx.translate(cx, cy);
  // plataforma de concreto
  ctx.fillStyle = 'rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.ellipse(5, 6, 50, 50, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#6c7077';
  ctx.beginPath(); ctx.arc(0, 0, 48, 0, 7); ctx.fill();
  ctx.fillStyle = '#5a5e64';
  ctx.beginPath(); ctx.arc(0, 0, 42, 0, 7); ctx.fill();
  // anel branco
  ctx.strokeStyle = '#e9eef2'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, 36, 0, 7); ctx.stroke();
  // "H" central
  ctx.strokeStyle = '#eef3f7'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-13, -18); ctx.lineTo(-13, 18);
  ctx.moveTo(13, -18);  ctx.lineTo(13, 18);
  ctx.moveTo(-13, 0);   ctx.lineTo(13, 0);
  ctx.stroke();
  // luzes de borda piscando
  for (let a = 0; a < 7; a += Math.PI / 4) {
    const on = (Math.floor(frame / 14) % 2) === 0;
    ctx.fillStyle = on ? '#ffd24a' : '#7a6320';
    ctx.beginPath();
    ctx.arc(Math.cos(a) * 44, Math.sin(a) * 44, 3.2, 0, 7);
    ctx.fill();
  }
  // poeira/sopro do rotor durante a decolagem
  if (player.takeoff > 0) {
    const k = 1 - player.takeoff / TAKEOFF;
    ctx.globalCompositeOperation = 'lighter';
    const g = ctx.createRadialGradient(0, 0, 6, 0, 0, 30 + k * 22);
    g.addColorStop(0, `rgba(220,210,185,${0.30 * (1 - k)})`);
    g.addColorStop(1, 'rgba(220,210,185,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, 30 + k * 22, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function drawHeli(x, y, blink, sc) {
  ctx.save();
  ctx.translate(x, y);
  if (sc && sc !== 1) ctx.scale(sc, sc);
  if (blink && Math.floor(frame/4)%2) ctx.globalAlpha = .35;

  // sombra projetada no chão (deslocada)
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath();
  ctx.ellipse(6, 30, 16, 9, 0, 0, 7);
  ctx.fill();

  // rotor wash (sopro do rotor sobre o solo)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const wash = ctx.createRadialGradient(0,-2,4,0,-2,30);
  wash.addColorStop(0,'rgba(255,255,255,.10)');
  wash.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = wash;
  ctx.beginPath(); ctx.arc(0,-2,30,0,7); ctx.fill();
  ctx.restore();

  // flash do disparo (logo após atirar)
  if (player.cd >= 5) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    [-8, 8].forEach(dx => {
      const fg = ctx.createRadialGradient(dx,-22,0,dx,-22,9);
      fg.addColorStop(0,'rgba(255,240,160,.95)');
      fg.addColorStop(1,'rgba(255,170,30,0)');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(dx,-22,9,0,7); ctx.fill();
    });
    ctx.restore();
  }

  // lança de cauda (fina, afilando para trás)
  ctx.fillStyle = '#3c6e2f';
  ctx.beginPath();
  ctx.moveTo(-4, 6); ctx.lineTo(4, 6);
  ctx.lineTo(2.5, 30); ctx.lineTo(-2.5, 30);
  ctx.closePath(); ctx.fill();
  // estabilizador horizontal da cauda
  ctx.fillStyle = '#2f5524';
  ctx.fillRect(-9, 24, 18, 5);

  // fuselagem (oval alongada)
  ctx.fillStyle = '#4f8a3a';
  ctx.beginPath();
  ctx.ellipse(0, -2, 11, 19, 0, 0, 7);
  ctx.fill();
  // nariz mais claro
  ctx.fillStyle = '#5fa247';
  ctx.beginPath();
  ctx.ellipse(0, -12, 9, 9, 0, 0, 7);
  ctx.fill();
  // faixa militar
  ctx.fillStyle = '#33611f';
  ctx.fillRect(-11, -4, 22, 5);

  // cockpit envidraçado
  ctx.fillStyle = '#bfe9ff';
  ctx.beginPath();
  ctx.ellipse(0, -13, 6, 7, 0, 0, 7);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.fillRect(-4, -16, 3, 6);

  // patins de pouso
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-14, -8); ctx.lineTo(-14, 10);
  ctx.moveTo(14, -8);  ctx.lineTo(14, 10);
  ctx.stroke();

  // rotor de cauda
  const ta = frame * 1.4;
  ctx.strokeStyle = '#cfcfcf';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 29 - Math.cos(ta)*7);
  ctx.lineTo(0, 29 + Math.cos(ta)*7);
  ctx.stroke();

  // rotor principal: disco translúcido + pás
  ctx.fillStyle = 'rgba(220,220,220,.10)';
  ctx.beginPath();
  ctx.arc(0, -4, 26, 0, 7);
  ctx.fill();
  const a = frame * 0.8;
  ctx.strokeStyle = 'rgba(235,235,235,.85)';
  ctx.lineWidth = 3;
  for (let k = 0; k < 2; k++) {
    const an = a + k * 1.57;
    ctx.beginPath();
    ctx.moveTo(Math.cos(an)*26, -4 + Math.sin(an)*26);
    ctx.lineTo(-Math.cos(an)*26, -4 - Math.sin(an)*26);
    ctx.stroke();
  }
  // cubo central do rotor
  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath();
  ctx.arc(0, -4, 3.5, 0, 7);
  ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  // sombra de contato
  ctx.fillStyle = 'rgba(0,0,0,.22)';
  ctx.beginPath();
  ctx.ellipse(4, 5, e.w*0.55, e.h*0.5, 0, 0, 7);
  ctx.fill();
  ctx.fillStyle = e.col;
  const w = e.w, h = e.h;
  if (e.t === 'train') {
    const dir = e.vx >= 0 ? 1 : -1;          // sentido de marcha
    const carW = 44, gap = 2;
    // vagões (a partir da traseira até a locomotiva na frente)
    for (let i = 0; i < e.cars; i++) {
      const cxp = -w/2 + 8 + i*(carW+gap) + carW/2;
      const loco = (dir > 0) ? (i === e.cars-1) : (i === 0);
      const cg = ctx.createLinearGradient(0,-h/2,0,h/2);
      cg.addColorStop(0, loco ? '#7a2a26' : '#3f4654');
      cg.addColorStop(1, loco ? '#4a1714' : '#272c36');
      ctx.fillStyle = cg;
      ctx.fillRect(cxp-carW/2, -h/2, carW, h);
      ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.lineWidth = 2;
      ctx.strokeRect(cxp-carW/2, -h/2, carW, h);
      // teto e janelas
      ctx.fillStyle = loco ? '#9a3a30' : '#5b6678';
      ctx.fillRect(cxp-carW/2+3, -h/2+3, carW-6, 6);
      ctx.fillStyle = '#cfe6f5';
      for (let k=-1;k<2;k++) ctx.fillRect(cxp+k*12-4, -3, 8, 7);
      // rodas
      ctx.fillStyle = '#15171c';
      [-1,1].forEach(s=>{ ctx.beginPath();
        ctx.arc(cxp+s*12, h/2, 5, 0, 7); ctx.fill(); });
      // engate
      if (i < e.cars-1) { ctx.fillStyle='#222';
        ctx.fillRect(cxp+carW/2-1, -2, gap+2, 4); }
      if (loco) { // chaminé da locomotiva
        ctx.fillStyle = '#1c1c1c';
        ctx.beginPath(); ctx.arc(cxp+dir*10, 0, 5, 0, 7); ctx.fill();
        ctx.fillStyle = `rgba(60,60,60,${0.3+0.2*Math.sin(frame*0.3)})`;
        ctx.beginPath(); ctx.arc(cxp+dir*10-dir*8, -4, 9, 0, 7); ctx.fill();
      }
    }
    // canhões giratórios em 2 vagões, mirando o helicóptero
    [-w*0.28, w*0.18].forEach(ox => {
      ctx.save();
      ctx.translate(ox, 0);
      const a = Math.atan2(player.y - e.y, player.x - (e.x+ox));
      ctx.rotate(a);
      ctx.fillStyle = '#23271b';
      ctx.fillRect(0, -3, 22, 6);
      ctx.fillStyle = '#5a6450';
      ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
      ctx.restore();
    });
    ctx.restore();
    return;
  }
  if (e.t === 'tank') {
    // casco + esteiras giram conforme a manobra (até ±45°)
    ctx.save();
    ctx.rotate(-(e.head || 0));
    ctx.fillStyle = '#2c2c2c';
    ctx.fillRect(-w/2, -h/2, 7, h);
    ctx.fillRect(w/2-7, -h/2, 7, h);
    ctx.fillStyle = '#555';
    const tread = (Math.floor((e.y + scrollY) / 5)) % 2;
    for (let i = 0; i < h; i += 6) {
      if (((i/6)|0) % 2 === tread) {
        ctx.fillRect(-w/2, -h/2 + i, 7, 3);
        ctx.fillRect(w/2-7, -h/2 + i, 7, 3);
      }
    }
    // casco (hull)
    ctx.fillStyle = e.col;
    ctx.fillRect(-w/2+6, -h/2+3, w-12, h-6);
    ctx.fillStyle = '#6e5e38';
    ctx.fillRect(-w/2+6, -h/2+3, w-12, 4);
    ctx.fillStyle = '#7a6a40';
    ctx.fillRect(-w/2+6, h/2-9, w-12, 4);  // proa frontal
    ctx.restore();
    // torre giratória apontando pro jogador (independe do casco)
    const ang = Math.atan2(player.y - e.y, player.x - e.x);
    ctx.rotate(ang);                     // +x local aponta no jogador
    ctx.fillStyle = '#3c3320';
    ctx.fillRect(0, -3, 24, 6);          // canhão longo p/ o jogador
    ctx.fillStyle = '#5a4d2c';
    ctx.beginPath();
    ctx.arc(0, 0, 9, 0, 7); ctx.fill();  // torre redonda
    ctx.fillStyle = '#3c3320';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, 7); ctx.fill();  // escotilha
  } else if (e.t === 'ship') {
    // ---- canhoneira: proa segue o curso do rio ----
    const rang = Math.atan2(
      riverCX(e.y-22) - riverCX(e.y+22), 44);   // tangente do rio
    ctx.save();
    ctx.rotate(rang);
    // espuma/esteira atrás
    ctx.fillStyle = 'rgba(220,240,255,.30)';
    ctx.beginPath();
    ctx.moveTo(-8, -h/2); ctx.quadraticCurveTo(0, -h/2-12, 8, -h/2);
    ctx.fill();
    // casco
    const hgr = ctx.createLinearGradient(-w/2,0,w/2,0);
    hgr.addColorStop(0,'#3c4654'); hgr.addColorStop(.5,'#5a6678');
    hgr.addColorStop(1,'#333c48');
    ctx.fillStyle = hgr;
    ctx.beginPath();
    ctx.moveTo(0, h/2);                       // proa em bico
    ctx.lineTo(w/2, h/6);
    ctx.lineTo(w/2-2, -h/2+6);
    ctx.quadraticCurveTo(0,-h/2-2,-w/2+2,-h/2+6);
    ctx.lineTo(-w/2, h/6);
    ctx.closePath(); ctx.fill();
    // convés
    ctx.fillStyle = '#2c3340';
    ctx.fillRect(-w/2+6, -h/4, w-12, h*0.55);
    // superestrutura / ponte de comando
    ctx.fillStyle = '#788499';
    ctx.fillRect(-9, -8, 18, 18);
    ctx.fillStyle = '#cfe6f5';
    ctx.fillRect(-6, -5, 12, 6);
    ctx.fillStyle = '#9aa6b5';
    ctx.fillRect(-2, -18, 4, 10);             // mastro
    ctx.restore();
    // torre de canhão giratória mirando o jogador (independe do rio)
    const sa = Math.atan2(player.y - e.y, player.x - e.x);
    ctx.save();
    ctx.rotate(sa);
    ctx.fillStyle = '#20252e';
    ctx.fillRect(0, -3, 22, 6);               // cano p/ o jogador
    ctx.fillStyle = '#41495a';
    ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
    ctx.restore();
  } else if (e.t === 'build') {
    // ---- bunker/fortim militar ----
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.fillRect(-w/2+3, -h/2+4, w, h);       // sombra
    // base de concreto
    const bgr = ctx.createLinearGradient(0,-h/2,0,h/2);
    bgr.addColorStop(0,'#8d8576'); bgr.addColorStop(1,'#5f5849');
    ctx.fillStyle = bgr;
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.strokeStyle = '#3c372c'; ctx.lineWidth = 2;
    ctx.strokeRect(-w/2, -h/2, w, h);
    // telhado recuado / plataforma
    ctx.fillStyle = '#6b6453';
    ctx.fillRect(-w/2+5, -h/2+5, w-10, h-10);
    // sacos de areia nos cantos
    ctx.fillStyle = '#9c8d5f';
    [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx,sy])=>{
      ctx.beginPath();
      ctx.arc(sx*(w/2-7), sy*(h/2-7), 6, 0, 7); ctx.fill();
    });
    // cúpula central com canhão antiaéreo
    ctx.fillStyle = '#43403a';
    ctx.beginPath(); ctx.arc(0,0,9,0,7); ctx.fill();
    const ba = Math.atan2(player.y-e.y, player.x-e.x);
    ctx.save(); ctx.rotate(ba);
    ctx.fillStyle = '#26241f';
    ctx.fillRect(0,-2,18,4);
    ctx.restore();
    ctx.fillStyle = '#c5b063';                // luz de alerta piscando
    if (Math.floor(frame/15)%2)
      { ctx.beginPath(); ctx.arc(0,0,3,0,7); ctx.fill(); }
  } else if (e.t === 'boat') {
    // ---- lancha de patrulha rápida ----
    const wob = Math.sin((e.y + scrollY) * 0.06) * 0.05;
    ctx.rotate(wob);
    // esteira/espuma atrás (-y)
    ctx.fillStyle = 'rgba(220,240,255,.32)';
    ctx.beginPath();
    ctx.moveTo(-7, -h/2); ctx.quadraticCurveTo(0, -h/2-14, 7, -h/2);
    ctx.fill();
    // casco em bico (proa em +y)
    const bg = ctx.createLinearGradient(-w/2,0,w/2,0);
    bg.addColorStop(0,'#465360'); bg.addColorStop(.5,'#67757f'); bg.addColorStop(1,'#3c4751');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(0, h/2);
    ctx.lineTo(w/2, 0); ctx.lineTo(w/2-3, -h/2+4);
    ctx.lineTo(-w/2+3, -h/2+4); ctx.lineTo(-w/2, 0);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#2b323b';                 // convés
    ctx.fillRect(-w/2+5, -h/4, w-10, h*0.5);
    ctx.fillStyle = '#8c98a5';                 // cabine
    ctx.fillRect(-6, -4, 12, 12);
    ctx.fillStyle = '#bfe9ff';
    ctx.fillRect(-4, -2, 8, 5);
    // metralhadora mirando o jogador
    const ba2 = Math.atan2(player.y - e.y, player.x - e.x);
    ctx.save(); ctx.rotate(ba2);
    ctx.fillStyle = '#1d222a'; ctx.fillRect(0, -2, 16, 4);
    ctx.fillStyle = '#414a59'; ctx.beginPath(); ctx.arc(0,0,5,0,7); ctx.fill();
    ctx.restore();
  } else if (e.t === 'warship') {
    // ---- contratorpedeiro: 2 torres mirando o jogador ----
    ctx.fillStyle = 'rgba(220,240,255,.30)';
    ctx.beginPath();
    ctx.moveTo(-9, -h/2); ctx.quadraticCurveTo(0, -h/2-16, 9, -h/2);
    ctx.fill();
    const hg = ctx.createLinearGradient(-w/2,0,w/2,0);
    hg.addColorStop(0,'#374049'); hg.addColorStop(.5,'#5a6670'); hg.addColorStop(1,'#2f373f');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.moveTo(0, h/2);                         // proa
    ctx.lineTo(w/2, h*0.18);
    ctx.lineTo(w/2-2, -h/2+8);
    ctx.quadraticCurveTo(0, -h/2-2, -w/2+2, -h/2+8);
    ctx.lineTo(-w/2, h*0.18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#272f37';                  // convés
    ctx.fillRect(-w/2+6, -h*0.34, w-12, h*0.74);
    ctx.fillStyle = '#7c8a98';                  // superestrutura
    ctx.fillRect(-11, -h*0.10, 22, 26);
    ctx.fillStyle = '#cfe6f5';
    ctx.fillRect(-8, -h*0.06, 16, 7);
    ctx.fillStyle = '#9aa6b5';                  // mastro radar
    ctx.fillRect(-2, -h*0.22, 4, 14);
    ctx.strokeStyle = '#b8c4d2'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-9,-h*0.20); ctx.lineTo(9,-h*0.20); ctx.stroke();
    // duas torres giratórias mirando o jogador
    [h*0.30, -h*0.30].forEach(oy => {
      ctx.save();
      ctx.translate(0, oy);
      const a = Math.atan2(player.y - (e.y+oy), player.x - e.x);
      ctx.rotate(a);
      ctx.fillStyle = '#1c212a'; ctx.fillRect(0, -3, 22, 6);
      ctx.fillStyle = '#3c4654'; ctx.beginPath(); ctx.arc(0,0,8,0,7); ctx.fill();
      ctx.restore();
    });
  } else if (e.t === 'carrier') {
    // ---- porta-aviões: convés de voo + ilha + canhões + caças ----
    ctx.fillStyle = 'rgba(220,240,255,.28)';
    ctx.beginPath();
    ctx.moveTo(-12, -h/2); ctx.quadraticCurveTo(0, -h/2-20, 12, -h/2);
    ctx.fill();
    // casco
    const cg = ctx.createLinearGradient(-w/2,0,w/2,0);
    cg.addColorStop(0,'#2f373f'); cg.addColorStop(.5,'#4a5560'); cg.addColorStop(1,'#282f36');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.moveTo(0, h/2);
    ctx.lineTo(w/2, h*0.30);
    ctx.lineTo(w/2, -h/2+6);
    ctx.quadraticCurveTo(0, -h/2-3, -w/2, -h/2+6);
    ctx.lineTo(-w/2, h*0.30);
    ctx.closePath(); ctx.fill();
    // convés de voo
    ctx.fillStyle = '#33383c';
    ctx.fillRect(-w/2+5, -h/2+8, w-10, h-20);
    // pista central tracejada + pista angular
    ctx.strokeStyle = 'rgba(245,245,210,.7)';
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 9]);
    ctx.beginPath(); ctx.moveTo(0, -h/2+14); ctx.lineTo(0, h/2-16); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-w/2+10, h/2-18); ctx.lineTo(w/2-8, -h/2+18); ctx.stroke();
    ctx.setLineDash([]);
    // faixas das pontas
    ctx.strokeStyle = 'rgba(245,245,210,.55)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-w/2+8, h/2-12); ctx.lineTo(w/2-8, h/2-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-w/2+8, -h/2+12); ctx.lineTo(w/2-8, -h/2+12); ctx.stroke();
    // ilha (superestrutura a estibordo)
    ctx.fillStyle = '#6d7884';
    ctx.fillRect(w/2-16, -h*0.10, 13, 40);
    ctx.fillStyle = '#cfe6f5';
    ctx.fillRect(w/2-14, -h*0.07, 9, 6);
    ctx.fillStyle = '#9aa6b5';
    ctx.fillRect(w/2-11, -h*0.10-12, 3, 12);   // mastro
    // caça estacionado no convés
    ctx.save();
    ctx.translate(-w*0.22, -h*0.22);
    ctx.fillStyle = '#aeb7c2';
    ctx.beginPath();
    ctx.moveTo(0, 10); ctx.lineTo(3, 0); ctx.lineTo(3,-9);
    ctx.lineTo(-3,-9); ctx.lineTo(-3, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8a94a0';
    ctx.fillRect(-10, -2, 20, 4);
    ctx.restore();
    // fumaça/flash de catapulta ao lançar
    if (e.launchFx > 0) {
      ctx.fillStyle = `rgba(255,230,170,${e.launchFx/14})`;
      ctx.beginPath();
      ctx.arc(0, h*0.30, 10 + (10-e.launchFx)*1.5, 0, 7);
      ctx.fill();
    }
    // canhões antiaéreos nas 4 quinas, mirando o jogador
    [[-w*0.40, h*0.36],[w*0.40, h*0.36],
     [-w*0.40,-h*0.36],[w*0.40,-h*0.36]].forEach(([ox,oy]) => {
      ctx.save();
      ctx.translate(ox, oy);
      const a = Math.atan2(player.y - (e.y+oy), player.x - (e.x+ox));
      ctx.rotate(a);
      ctx.fillStyle = '#1b212a'; ctx.fillRect(0, -2, 14, 4);
      ctx.fillStyle = '#3a4450'; ctx.beginPath(); ctx.arc(0,0,5,0,7); ctx.fill();
      ctx.restore();
    });
  } else { // ---- caça a jato (nariz em +y) ----
    // chama do pós-combustor (atrás = -y)
    ctx.fillStyle = `rgba(255,${150+Math.random()*80|0},40,.8)`;
    ctx.beginPath();
    ctx.moveTo(-4,-h/2); ctx.lineTo(0,-h/2-9-Math.random()*5);
    ctx.lineTo(4,-h/2); ctx.closePath(); ctx.fill();
    // fuselagem
    const jg = ctx.createLinearGradient(-w/2,0,w/2,0);
    jg.addColorStop(0,'#7a8390'); jg.addColorStop(.5,'#c2c9d2');
    jg.addColorStop(1,'#7a8390');
    ctx.fillStyle = jg;
    ctx.beginPath();
    ctx.moveTo(0, h/2);                       // nariz
    ctx.lineTo(4, 0); ctx.lineTo(3, -h/2);
    ctx.lineTo(-3, -h/2); ctx.lineTo(-4, 0);
    ctx.closePath(); ctx.fill();
    // asas em delta
    ctx.fillStyle = '#9aa3b0';
    ctx.beginPath();
    ctx.moveTo(0, h/6); ctx.lineTo(w/2, -h/3);
    ctx.lineTo(w/2-4, -h/2+2); ctx.lineTo(0,-h/8); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, h/6); ctx.lineTo(-w/2, -h/3);
    ctx.lineTo(-w/2+4, -h/2+2); ctx.lineTo(0,-h/8); ctx.closePath(); ctx.fill();
    // estabilizadores traseiros
    ctx.fillStyle = '#7e8794';
    ctx.beginPath();
    ctx.moveTo(0,-h/3); ctx.lineTo(7,-h/2); ctx.lineTo(0,-h/2.4);
    ctx.lineTo(-7,-h/2); ctx.closePath(); ctx.fill();
    // canopy
    ctx.fillStyle = '#bfe9ff';
    ctx.beginPath(); ctx.ellipse(0, h/6, 3.2, 6, 0, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function render() {
  ctx.save();
  if (shake > 0.4)
    ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);

  drawTerrain();

  // embarcações PRIMEIRO (ficam na água) — depois a ponte as cobre
  const onWater = e => isVessel(e.t);
  enemies.forEach(e => { if (onWater(e)) drawEnemy(e); });
  // pontes: só os barcos passam por baixo
  drawBridgesOver();

  // tiros do player: tracer com brilho (por cima da ponte)
  ctx.save();
  ctx.shadowColor = '#ffd23c'; ctx.shadowBlur = 9;
  bullets.forEach(b => {
    ctx.fillStyle = b.side ? '#7fffe0' : '#fff2a0';
    ctx.fillRect(b.x-b.w/2, b.y-b.h/2, b.w, b.h);
    ctx.fillStyle = b.side ? '#2ad6c8' : '#ffb020';
    ctx.fillRect(b.x-b.w/2, b.y-b.h/2+b.h*0.55, b.w, b.h*0.45);
  });
  ctx.restore();

  // demais inimigos por cima da ponte (passam por cima)
  enemies.forEach(e => { if (!onWater(e)) drawEnemy(e); });
  if (boss) drawBoss();

  powerups.forEach(u => {
    const pulse = 1 + Math.sin(frame*0.2)*0.12;
    ctx.save();
    ctx.translate(u.x, u.y); ctx.scale(pulse, pulse);
    ctx.shadowColor = u.col; ctx.shadowBlur = 14;
    ctx.fillStyle = '#0c1018';
    ctx.beginPath(); ctx.arc(0,0,14,0,7); ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = u.col;
    ctx.beginPath(); ctx.arc(0,0,12,0,7); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = u.col;
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(u.label, 0, 1);
    ctx.restore();
  });
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

  eBullets.forEach(b => {
    ctx.save();
    if (b.missile) {
      // míssil vertical: corpo metálico, ogiva vermelha e chama
      ctx.shadowColor = '#ff8a1e'; ctx.shadowBlur = 12;
      // rastro de fogo (atrás = acima, pois desce)
      const fl = ctx.createLinearGradient(0, b.y-16, 0, b.y);
      fl.addColorStop(0, 'rgba(255,210,40,0)');
      fl.addColorStop(.6, 'rgba(255,150,30,.7)');
      fl.addColorStop(1, 'rgba(255,90,20,.9)');
      ctx.fillStyle = fl;
      ctx.beginPath();
      ctx.moveTo(b.x-3, b.y-4); ctx.lineTo(b.x, b.y-16-Math.random()*6);
      ctx.lineTo(b.x+3, b.y-4); ctx.closePath(); ctx.fill();
      // corpo
      ctx.fillStyle = '#9aa0a8';
      ctx.fillRect(b.x-3, b.y-8, 6, 12);
      // ogiva vermelha (aponta p/ baixo)
      ctx.fillStyle = '#d8362a';
      ctx.beginPath();
      ctx.moveTo(b.x-3, b.y+4); ctx.lineTo(b.x, b.y+10);
      ctx.lineTo(b.x+3, b.y+4); ctx.closePath(); ctx.fill();
      // aletas
      ctx.fillStyle = '#6b7077';
      ctx.fillRect(b.x-5, b.y-8, 2, 5);
      ctx.fillRect(b.x+3, b.y-8, 2, 5);
    } else {
      ctx.shadowColor = '#ff5a3c'; ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(255,140,60,.55)';
      ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill();
      ctx.fillStyle = '#ffd24d';
      ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, 7); ctx.fill();
    }
    ctx.restore();
  });

  // partículas com glow aditivo
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  parts.forEach(pt => {
    const a = Math.max(0, pt.life/40);
    ctx.globalAlpha = a;
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 2.4 + a*2.2, 0, 7);
    ctx.fill();
  });
  ctx.restore();
  ctx.globalAlpha = 1;

  if (state === 'play' || state === 'pause')
    drawHeli(player.x, player.y, invuln > 0 && player.takeoff <= 0, player.alt);

  ctx.restore(); // fim do shake

  // HUD inferior: bombas + armas
  ctx.font = '13px Courier New';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('BOMBAS ' + '◆'.repeat(bombs), 8, H - 12);
  ctx.fillStyle = '#ff5a3c';
  ctx.fillText('TIRO ' + 'I'.repeat(player.pwr||1), 8, H - 30);
  if (player.side) {
    ctx.fillStyle = '#3ca0ff';
    ctx.fillText('LAT ' + '<>'.repeat(player.side), 110, H - 30);
  }
  if (player.rapid) {
    ctx.fillStyle = '#5ff0d0';
    ctx.fillText('TURBO ' + '»'.repeat(player.rapid), 200, H - 30);
  }
  // fase + progresso até o chefe
  ctx.fillStyle = '#cfe0c0'; ctx.textAlign = 'right';
  ctx.fillText('FASE ' + stage, W - 8, H - 12);
  if (!boss && !bossPending) {
    const pr = 1 - Math.max(0, stageT) / STAGE_FRAMES;
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.fillRect(W-92, H-26, 84, 5);
    ctx.fillStyle = '#cfe0c0';
    ctx.fillRect(W-92, H-26, 84*pr, 5);
  }
  ctx.textAlign = 'left';

  // banner de fase/aviso
  if (banner && banner.t > 0) {
    const a = Math.max(0, Math.min(1, banner.t/40) * Math.min(1, (150-banner.t)/15));
    const danger = banner.txt === 'PERIGO';
    ctx.save();
    ctx.textAlign = 'center';
    if (danger) {
      // faixa de fundo VERMELHA piscando + texto BRANCO
      const blink = Math.floor(frame/6) % 2;
      ctx.globalAlpha = a * (0.55 + 0.45*blink);
      ctx.fillStyle = '#d11';
      ctx.fillRect(0, H/2 - 46, W, 92);
      ctx.fillStyle = '#7a0a0a';
      ctx.fillRect(0, H/2 - 46, W, 4);
      ctx.fillRect(0, H/2 + 42, W, 4);
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 46px Courier New';
      ctx.fillText(banner.txt, W/2, H/2 - 4);
      ctx.font = 'bold 16px Courier New';
      ctx.fillText(banner.sub, W/2, H/2 + 24);
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffcf3f';
      ctx.font = 'bold 44px Courier New';
      ctx.fillText(banner.txt, W/2, H/2 - 8);
      ctx.fillStyle = '#5ff0d0';
      ctx.font = 'bold 16px Courier New';
      ctx.fillText(banner.sub, W/2, H/2 + 20);
    }
    ctx.restore();
    ctx.textAlign = 'left'; ctx.globalAlpha = 1;
  }

  // barra de vida do chefe
  if (boss && !boss.intro) {
    const bw = W - 60;
    ctx.fillStyle = '#400';
    ctx.fillRect(30, 32, bw, 10);
    ctx.fillStyle = '#e23';
    ctx.fillRect(30, 32, bw * Math.max(0, boss.hp/boss.maxhp), 10);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.strokeRect(30, 32, bw, 10);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('CHEFE — FASE ' + stage, W/2, 28);
    ctx.textAlign = 'left';
  }
}

function drawBossTank(b, W2, H2, hurt, gl) {
  ctx.fillStyle = 'rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(8, 8, W2+4, H2*0.95, 0, 0, 7); ctx.fill();
  const trW = 24;
  [-1,1].forEach(s => {
    const cx = s*(W2 - trW/2);
    ctx.fillStyle = '#1f2227';
    ctx.fillRect(cx-trW/2, -H2, trW, b.h);
    ctx.fillStyle = '#3a3d44';
    const ph = ((b.tread % 16)+16)%16;
    for (let y=-H2-16+ph; y<H2; y+=16) ctx.fillRect(cx-trW/2, y, trW, 8);
  });
  const hw = b.w - trW*2 + 6;
  const hg = ctx.createLinearGradient(-hw/2,0,hw/2,0);
  hg.addColorStop(0,'#4d5a3c'); hg.addColorStop(.5,'#6b7a4e'); hg.addColorStop(1,'#3f4a32');
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.moveTo(-hw/2,-H2+10); ctx.lineTo(0,-H2); ctx.lineTo(hw/2,-H2+10);
  ctx.lineTo(hw/2,H2-20); ctx.lineTo(hw/2-12,H2);
  ctx.lineTo(-hw/2+12,H2); ctx.lineTo(-hw/2,H2-20); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#caa92f';
  ctx.fillRect(-hw/2+12, H2-12, hw-24, 8);
  ctx.fillStyle = '#1d1f12';
  for (let x=-hw/2+12; x<hw/2-12; x+=14) ctx.fillRect(x, H2-12, 7, 8);
  // motor traseiro brilhando
  ctx.fillStyle = '#23281c'; ctx.fillRect(-24,-H2+12,48,26);
  ctx.fillStyle = `rgba(255,${110+gl*120|0},40,${.5+gl*.4})`;
  for (let i=-1;i<2;i++) ctx.fillRect(-18+i*15,-H2+16,9,18);
  if (hurt) { ctx.fillStyle=`rgba(40,40,40,${.25+gl*.2})`;
    ctx.beginPath(); ctx.arc(0,-H2+4,16+gl*6,0,7); ctx.fill(); }
  // torre giratória + canhão duplo
  const ang = Math.atan2(player.y-b.y, player.x-b.x);
  ctx.save(); ctx.rotate(ang);
  ctx.fillStyle='#23271b'; ctx.fillRect(0,-7,60,6); ctx.fillRect(0,1,60,6);
  ctx.fillStyle='#11130d'; ctx.fillRect(54,-9,9,8); ctx.fillRect(54,1,9,8);
  const tg = ctx.createRadialGradient(-6,-6,4,0,0,28);
  tg.addColorStop(0,'#7d8a5c'); tg.addColorStop(1,'#454f33');
  ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(0,0,28,0,7); ctx.fill();
  ctx.fillStyle='#363c26'; ctx.beginPath(); ctx.arc(-5,0,9,0,7); ctx.fill();
  ctx.restore();
  if (hurt) { ctx.strokeStyle=`rgba(255,60,40,${.3+gl*.3})`;
    ctx.lineWidth=3; ctx.strokeRect(-W2,-H2,b.w,b.h); }
}
function drawBossShip(b, W2, H2, hurt, gl) {
  // esteira de espuma atrás
  ctx.fillStyle = 'rgba(220,240,255,.25)';
  ctx.beginPath(); ctx.moveTo(-14,-H2);
  ctx.quadraticCurveTo(0,-H2-22,14,-H2); ctx.fill();
  // casco (proa em +y)
  const hg = ctx.createLinearGradient(-W2,0,W2,0);
  hg.addColorStop(0,'#33414e'); hg.addColorStop(.5,'#5a6878'); hg.addColorStop(1,'#2c3742');
  ctx.fillStyle = hg;
  ctx.beginPath();
  ctx.moveTo(0,H2); ctx.lineTo(W2,H2*0.45); ctx.lineTo(W2-3,-H2+10);
  ctx.quadraticCurveTo(0,-H2-4,-W2+3,-H2+10);
  ctx.lineTo(-W2,H2*0.45); ctx.closePath(); ctx.fill();
  // convés
  ctx.fillStyle = '#27313c';
  ctx.fillRect(-W2+8,-H2+14,b.w-16,b.h-28);
  // superestrutura central
  ctx.fillStyle = '#7a8799'; ctx.fillRect(-16,-14,32,40);
  ctx.fillStyle = '#cfe6f5'; ctx.fillRect(-12,-10,24,10);
  ctx.fillStyle = '#9aa6b5'; ctx.fillRect(-3,-30,6,16);   // mastro
  // chaminés com fumaça
  ctx.fillStyle = '#33383f';
  [-8,8].forEach(ox=>ctx.fillRect(ox-4,30,8,12));
  if (hurt){ ctx.fillStyle=`rgba(40,40,40,${.3+gl*.2})`;
    ctx.beginPath(); ctx.arc(0,40,14+gl*6,0,7); ctx.fill(); }
  // 3 torres de canhão giratórias mirando o jogador
  [{x:0,y:H2*0.55},{x:0,y:-H2*0.45},{x:0,y:0}].forEach(t=>{
    ctx.save(); ctx.translate(t.x,t.y);
    const a = Math.atan2(player.y-(b.y+t.y), player.x-b.x);
    ctx.rotate(a);
    ctx.fillStyle='#1f2730'; ctx.fillRect(0,-4,26,8);
    ctx.fillStyle='#46505e'; ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill();
    ctx.restore();
  });
  if (hurt) { ctx.strokeStyle=`rgba(255,60,40,${.3+gl*.3})`;
    ctx.lineWidth=3; ctx.strokeRect(-W2,-H2,b.w,b.h); }
}
function drawBoss() {
  const b = boss;
  const W2 = b.w/2, H2 = b.h/2;
  const hurt = b.hp < b.maxhp/2;
  const gl = .55 + Math.sin(frame*0.22)*.45;
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.kind === 'tank') { drawBossTank(b, W2, H2, hurt, gl); ctx.restore(); return; }
  if (b.kind === 'ship') { drawBossShip(b, W2, H2, hurt, gl); ctx.restore(); return; }

  // sombra projetada no chão (deslocada — está voando)
  ctx.fillStyle = 'rgba(0,0,0,.28)';
  ctx.beginPath();
  ctx.ellipse(22, 26, W2*0.82, H2*0.7, 0, 0, 7); ctx.fill();

  // corpo do gunship inclina (banca) no strafe; o canhão é independente
  ctx.save();
  ctx.rotate(b.bank || 0);

  // ---- lança de cauda + estabilizador + rotor de cauda ----
  ctx.fillStyle = '#39433a';
  ctx.beginPath();
  ctx.moveTo(-7, -H2+30); ctx.lineTo(7, -H2+30);
  ctx.lineTo(4, -H2-30); ctx.lineTo(-4, -H2-30);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2d352e';
  ctx.fillRect(-22, -H2-26, 44, 9);            // estabilizador
  const ta = frame*1.3;                         // rotor de cauda
  ctx.strokeStyle = '#c8ccc4'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-6 - Math.cos(ta)*16, -H2-30 - Math.sin(ta)*16*0);
  ctx.lineTo(-6 + Math.cos(ta)*16, -H2-30);
  ctx.stroke();

  // ---- asas curtas com pods de foguete e mísseis ----
  [-1, 1].forEach(s => {
    ctx.fillStyle = '#454f3c';
    ctx.beginPath();
    ctx.moveTo(s*16, -6);
    ctx.lineTo(s*(W2+4), 4);
    ctx.lineTo(s*(W2+4), 24);
    ctx.lineTo(s*16, 20);
    ctx.closePath(); ctx.fill();
    // pod de foguetes (cilindro com bocas)
    ctx.fillStyle = '#2b2f25';
    ctx.fillRect(s*W2-9, 4, 22, 18);
    ctx.fillStyle = hurt ? '#ff7a2a' : '#11130d';
    for (let i=0;i<3;i++)
      { ctx.beginPath(); ctx.arc(s*W2-3+i*7, 22, 2.4, 0, 7); ctx.fill(); }
    // míssil sob a asa
    ctx.fillStyle = '#9aa0a8';
    ctx.fillRect(s*(W2*0.66)-3, 4, 6, 26);
    ctx.fillStyle = '#d8362a';
    ctx.beginPath();
    ctx.moveTo(s*(W2*0.66)-3,30); ctx.lineTo(s*(W2*0.66),36);
    ctx.lineTo(s*(W2*0.66)+3,30); ctx.closePath(); ctx.fill();
  });

  // ---- fuselagem blindada (gunship) ----
  const fg = ctx.createLinearGradient(-26,0,26,0);
  fg.addColorStop(0,'#39432f'); fg.addColorStop(.5,'#5c6a45');
  fg.addColorStop(1,'#323b29');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(0, H2);                            // nariz (frente, +y)
  ctx.quadraticCurveTo(26, H2-10, 24, H2*0.3);
  ctx.lineTo(20, -H2+34);
  ctx.quadraticCurveTo(16, -H2+10, 7, -H2+30);
  ctx.lineTo(-7, -H2+30);
  ctx.quadraticCurveTo(-16, -H2+10, -20, -H2+34);
  ctx.lineTo(-24, H2*0.3);
  ctx.quadraticCurveTo(-26, H2-10, 0, H2);
  ctx.closePath(); ctx.fill();
  // painéis
  ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = 2;
  ctx.strokeRect(-15, -H2+34, 30, b.h-46);

  // canopies em tandem (piloto + artilheiro)
  ctx.fillStyle = '#0e1b12';
  ctx.beginPath(); ctx.ellipse(0, H2*0.34, 12, 16, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -2, 13, 15, 0, 0, 7); ctx.fill();
  ctx.fillStyle = 'rgba(120,200,170,.45)';
  ctx.beginPath(); ctx.ellipse(0, H2*0.34, 9, 12, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -2, 10, 11, 0, 0, 7); ctx.fill();

  // turbinas com exaustão quente (ponto fraco)
  ctx.fillStyle = '#23281c';
  ctx.fillRect(-20, -H2+30, 40, 16);
  ctx.fillStyle = `rgba(255,${110+gl*120|0},40,${.5+gl*.4})`;
  ctx.fillRect(-16, -H2+34, 12, 9);
  ctx.fillRect(4, -H2+34, 12, 9);
  if (hurt) {                                   // fumaça de dano
    ctx.fillStyle = `rgba(40,40,40,${.22+gl*.2})`;
    ctx.beginPath(); ctx.arc(0,-H2+18,15+gl*7,0,7); ctx.fill();
  }
  ctx.restore(); // fim do banking do corpo

  // ---- canhão de queixo no nariz, mirando o jogador ----
  const gy = H2*0.62;
  const ang = Math.atan2(player.y - b.y - gy, player.x - b.x);
  ctx.save();
  ctx.translate(0, gy);
  ctx.rotate(ang);
  ctx.fillStyle = '#1c2016';
  ctx.fillRect(0, -4, 26, 8);
  ctx.fillStyle = '#11130d';
  ctx.fillRect(22, -5, 7, 10);
  ctx.fillStyle = '#4a5439';
  ctx.beginPath(); ctx.arc(0,0,9,0,7); ctx.fill();
  ctx.restore();

  // ---- rotor principal (disco + 5 pás girando) ----
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const rw = ctx.createRadialGradient(0,0,10,0,0,W2+6);
  rw.addColorStop(0,'rgba(200,210,200,.05)');
  rw.addColorStop(1,'rgba(200,210,200,.14)');
  ctx.fillStyle = rw;
  ctx.beginPath(); ctx.arc(0,0,W2+6,0,7); ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(225,228,222,.8)'; ctx.lineWidth = 4;
  for (let k = 0; k < 5; k++) {
    const an = b.rotor + k * (Math.PI*2/5);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(an)*(W2+6), Math.sin(an)*(W2+6));
    ctx.stroke();
  }
  ctx.fillStyle = '#23271b';
  ctx.beginPath(); ctx.arc(0,0,7,0,7); ctx.fill();

  // flash de dano (só quando ferido — sem caixa fixa em volta)
  if (hurt) {
    ctx.strokeStyle = `rgba(255,60,40,${.3+gl*.3})`;
    ctx.lineWidth = 3;
    ctx.strokeRect(-W2, -H2-30, b.w, b.h+60);
  }

  ctx.restore();
}

function loop() {
  try {
    if (state === 'play') update();
    render();
  } catch (err) {
    console.error(err);
  }
  requestAnimationFrame(loop);
}
reset();
loop();
</script>
</body>
</html>
